[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
# medusa build outputs a standalone server (admin included) to .medusa/server —
# production must run from there, not the project root
cmds = ["npm run build", "cd .medusa/server && npm install"]

[start]
cmd = "cd .medusa/server && npm run predeploy && npm run start"
